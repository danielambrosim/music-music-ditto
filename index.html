<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ditto: Audio Alchemy</title>
    
    <!-- Bibliotecas externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Nosso CSS personalizado -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-spotify h-screen flex flex-col overflow-hidden">

    <!-- Header / Selector -->
    <header class="p-4 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-compact-disc text-2xl animate-spin-slow accent-color"></i>
            <h1 class="font-bold text-xl">BANCO DE MÚSICAS</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="setTheme('spotify')" class="px-3 py-1 rounded bg-green-600 text-white text-xs">Spotify</button>
            <button onclick="setTheme('apple')" class="px-3 py-1 rounded bg-red-500 text-white text-xs">Apple</button>
            <button onclick="setTheme('soundcloud')" class="px-3 py-1 rounded bg-orange-500 text-white text-xs">SoundCloud</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 p-4 card m-2 hidden md:block">
            <h2 class="font-bold mb-4 opacity-70">Sua Biblioteca</h2>
            <ul id="playlist-menu" class="space-y-2">
                <!-- Playlist será inserida via JS -->
            </ul>
        </aside>

        <!-- Main Content -->
        <section class="flex-1 p-6 flex flex-col items-center justify-center">
            <div id="now-playing-card" class="clair-shadow card p-8 w-full max-w-md text-center transition-all duration-700">
                <img id="cover-art" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" 
                     class="w-64 h-64 mx-auto rounded-lg mb-6 object-cover shadow-2xl">
                <h2 id="track-title" class="text-2xl font-bold">Escolha uma música</h2>
                <p id="track-artist" class="opacity-60 mb-6">Mestre Pokémon</p>

                <div class="w-full bg-gray-700 h-1 rounded-full mb-2 cursor-pointer overflow-hidden" onclick="seek(event)">
                    <div id="progress-bar" class="bg-accent h-full w-0"></div>
                </div>
                <div class="flex justify-between text-xs opacity-50 mb-6">
                    <span id="current-time">0:00</span>
                    <span id="total-duration">0:00</span>
                </div>

                <div class="flex items-center justify-center gap-8 text-3xl">
                    <button onclick="prev()"><i class="fa-solid fa-backward-step hover:opacity-70"></i></button>
                    <button onclick="togglePlay()" id="play-btn" class="bg-accent text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg">
                        <i class="fa-solid fa-play ml-1"></i>
                    </button>
                    <button onclick="next()"><i class="fa-solid fa-forward-step hover:opacity-70"></i></button>
                </div>
            </div>
        </section>
    </main>

    <audio id="main-player" ontimeupdate="updateProgress()"></audio>

    <!-- Nosso JavaScript separado -->
    <script src="script.js"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
